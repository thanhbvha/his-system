basePath: /api/v1
definitions:
  admin.AssignRolesReq:
    properties:
      role_ids:
        items:
          type: string
        type: array
    type: object
  admin.CreateDeptReq:
    properties:
      code:
        type: string
      description:
        type: string
      name:
        type: string
    type: object
  admin.CreateStaffReq:
    properties:
      department_id:
        type: string
      email:
        type: string
      password:
        type: string
      role_ids:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  admin.UpdatePermissionsReq:
    properties:
      permissions:
        items:
          $ref: '#/definitions/domain.Permission'
        type: array
    type: object
  auth.CompleteLoginRequest:
    properties:
      challenge_string:
        type: string
      device_fingerprint:
        type: string
      mfa_token:
        type: string
      public_key_pem:
        type: string
      signature:
        type: string
    type: object
  auth.InitLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  auth.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  auth.RefreshRequest:
    properties:
      public_key_pem:
        type: string
      refresh_token:
        type: string
      signature:
        type: string
    type: object
  auth.RegisterPatientRequest:
    properties:
      dob:
        description: '"2006-01-02"'
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        description: '"male", "female", "other"'
        type: string
      phone:
        type: string
    type: object
  auth.SendOTPRequest:
    properties:
      phone:
        type: string
    type: object
  auth.VerifyMFARequest:
    properties:
      totp_code:
        type: string
      user_id:
        description: Alternatively username
        type: string
    type: object
  auth.VerifyOTPRequest:
    properties:
      otp:
        type: string
      phone:
        type: string
    type: object
  command.CompleteLoginResult:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/command.UserPayload'
    type: object
  command.InitLoginResult:
    properties:
      challenge_string:
        type: string
      mfa_required:
        type: boolean
    type: object
  command.RefreshTokenResult:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  command.RefreshWebResult:
    properties:
      access_token:
        type: string
    type: object
  command.RegisterPatientResult:
    properties:
      access_token:
        type: string
    type: object
  command.SetupMFAResult:
    properties:
      backup_codes:
        items:
          type: string
        type: array
      qr_uri:
        type: string
    type: object
  command.UserPayload:
    properties:
      id:
        type: string
      mfa_enabled:
        type: boolean
      preferred_language:
        type: string
      role_ids:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  command.VerifyMFAResult:
    properties:
      mfa_token:
        type: string
    type: object
  command.VerifyOTPResult:
    properties:
      access_token:
        type: string
      needs_register:
        type: boolean
    type: object
  domain.OrderType:
    enum:
    - LAB
    - RADIOLOGY
    - PROCEDURE
    type: string
    x-enum-varnames:
    - OrderLab
    - OrderRadiology
    - OrderProcedure
  domain.Permission:
    properties:
      action:
        type: string
      id:
        type: string
      resource:
        type: string
    type: object
  domain.VisitStatus:
    enum:
    - REGISTERED
    - WAITING
    - IN_PROGRESS
    - ORDERED
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-varnames:
    - VisitRegistered
    - VisitWaiting
    - VisitInProgress
    - VisitOrdered
    - VisitCompleted
    - VisitCancelled
  handlers.BookReq:
    properties:
      doctor_id:
        type: string
      note:
        type: string
      patient_id:
        description: Used by staff
        type: string
      scheduled_at:
        description: RFC3339
        type: string
      service_id:
        type: string
      slot_id:
        type: string
    type: object
  handlers.CancelReq:
    properties:
      reason:
        type: string
    type: object
  handlers.CheckInReq:
    properties:
      appointment_id:
        type: string
      patient_id:
        type: string
      service_type:
        type: string
    type: object
  handlers.CreateOrderReq:
    properties:
      details:
        type: string
      order_type:
        $ref: '#/definitions/domain.OrderType'
    type: object
  handlers.CreatePatientReq:
    properties:
      address:
        type: string
      cccd:
        type: string
      dob:
        description: YYYY-MM-DD
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        type: string
      phone:
        type: string
    type: object
  handlers.CreateVisitReq:
    properties:
      chief_complaint:
        type: string
      doctor_id:
        type: string
      patient_id:
        type: string
      queue_entry_id:
        type: string
    type: object
  handlers.RecordVitalsReq:
    properties:
      bp_diastolic:
        type: integer
      bp_systolic:
        type: integer
      heart_rate:
        type: integer
      height_cm:
        type: number
      recorded_by:
        type: string
      spo2:
        type: integer
      temperature:
        type: number
      weight_kg:
        type: number
    type: object
  handlers.UpdateInsuranceReq:
    properties:
      bhyt_number:
        type: string
      coverage_level:
        type: string
      issuing_province:
        type: string
      valid_from:
        type: string
      valid_to:
        type: string
    type: object
  handlers.UpdatePatientReq:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      blood_type:
        type: string
      cccd:
        type: string
      dob:
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        type: string
      is_active:
        type: boolean
      phone:
        type: string
    type: object
  handlers.UpdateVisitStatusReq:
    properties:
      status:
        $ref: '#/definitions/domain.VisitStatus'
    type: object
  response.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorInfo'
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Hospital Information System API
  title: HIS System API
  version: "1.0"
paths:
  /admin/departments:
    get:
      consumes:
      - application/json
      description: Retrieve a list of departments.
      parameters:
      - default: false
        description: Include inactive departments
        in: query
        name: include_inactive
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List departments
      tags:
      - Admin (User/Role)
    post:
      consumes:
      - application/json
      description: Create a new department.
      parameters:
      - description: Department Creation Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateDeptReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create department
      tags:
      - Admin (User/Role)
  /admin/permissions:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all available system permissions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List permissions
      tags:
      - Admin (User/Role)
  /admin/roles:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all roles.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List roles
      tags:
      - Admin (User/Role)
  /admin/roles/{id}/permissions:
    get:
      consumes:
      - application/json
      description: Retrieve permissions for a specific role.
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get role permissions
      tags:
      - Admin (User/Role)
    put:
      consumes:
      - application/json
      description: Update the permissions assigned to a role.
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      - description: Permissions Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdatePermissionsReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update role permissions
      tags:
      - Admin (User/Role)
  /admin/users:
    get:
      consumes:
      - application/json
      description: Retrieve a list of staff users.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Admin (User/Role)
    post:
      consumes:
      - application/json
      description: Create a new staff user.
      parameters:
      - description: Staff Creation Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateStaffReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create staff user
      tags:
      - Admin (User/Role)
  /admin/users/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific staff user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Admin (User/Role)
  /admin/users/{id}/deactivate:
    put:
      consumes:
      - application/json
      description: Deactivate a staff user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Deactivate user
      tags:
      - Admin (User/Role)
  /admin/users/{id}/roles:
    put:
      consumes:
      - application/json
      description: Assign roles to a staff user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Role Assignment Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.AssignRolesReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Assign roles
      tags:
      - Admin (User/Role)
  /appointments:
    get:
      consumes:
      - application/json
      description: List appointments with optional filters.
      parameters:
      - description: Filter by date
        in: query
        name: date
        type: string
      - description: Filter by Doctor ID
        in: query
        name: doctor_id
        type: string
      - description: Filter by Patient ID
        in: query
        name: patient_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List appointments
      tags:
      - Appointment
  /appointments/{id}/cancel:
    put:
      consumes:
      - application/json
      description: Cancel an existing appointment.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: string
      - description: Cancellation Reason
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CancelReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Cancel appointment
      tags:
      - Appointment
  /appointments/{id}/confirm:
    put:
      consumes:
      - application/json
      description: Confirm an existing appointment.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Confirm appointment
      tags:
      - Appointment
  /appointments/book:
    post:
      consumes:
      - application/json
      description: Book a new appointment.
      parameters:
      - description: Booking Request Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BookReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Book appointment
      tags:
      - Appointment
  /appointments/slots:
    get:
      consumes:
      - application/json
      description: Retrieve available appointment slots for a doctor on a specific
        date.
      parameters:
      - description: Doctor ID
        in: query
        name: doctor_id
        required: true
        type: string
      - description: Date in YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get available slots
      tags:
      - Appointment
  /auth/login/complete:
    post:
      consumes:
      - application/json
      description: Verifies challenge signature and issues tokens
      parameters:
      - description: Challenge Response
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.CompleteLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.CompleteLoginResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      summary: Complete Desktop Login
      tags:
      - Auth (Desktop)
  /auth/login/init:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns a challenge string
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.InitLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.InitLoginResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/response.Response'
      summary: Initialize Desktop Login
      tags:
      - Auth (Desktop)
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the refresh token
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: Logout Desktop
      tags:
      - Auth (Desktop)
  /auth/mfa/setup:
    post:
      consumes:
      - application/json
      description: Generates TOTP secret and backup codes. Requires valid access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.SetupMFAResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Setup TOTP MFA
      tags:
      - Auth (Desktop)
  /auth/mfa/verify:
    post:
      consumes:
      - application/json
      description: Validates TOTP code to complete login flow
      parameters:
      - description: MFA Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyMFARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.VerifyMFAResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: Verify TOTP MFA
      tags:
      - Auth (Desktop)
  /auth/otp/send:
    post:
      consumes:
      - application/json
      description: Generates and sends OTP to patient's phone
      parameters:
      - description: Phone number
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
